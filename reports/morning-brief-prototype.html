<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HOZO-AM 早上 8 點半任務狀態晨報</title>
  <style>
    :root {
      --bg: #f6f7f4;
      --panel: #fff;
      --ink: #20242a;
      --muted: #66706b;
      --line: #d9ded6;
      --green: #2f6f5e;
      --shadow: 0 10px 28px rgba(23, 30, 26, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Microsoft JhengHei", "PingFang TC", system-ui, sans-serif;
      line-height: 1.6;
    }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
    }
    aside {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 24px 18px;
      background: #24342f;
      color: #f4f7f2;
    }
    .brand strong { display: block; font-size: 20px; }
    .brand span { display: block; margin-top: 4px; color: #bed0c7; font-size: 13px; }
    main { padding: 28px; }
    .top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 20px;
    }
    h1 { margin: 0; font-size: 28px; line-height: 1.25; }
    .subtitle { margin-top: 6px; color: var(--muted); }
    .date-card {
      min-width: 180px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px 14px;
      box-shadow: var(--shadow);
      text-align: right;
    }
    .date-card strong { display: block; font-size: 20px; }
    .date-card span { display: block; color: var(--muted); font-size: 13px; }
    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
      overflow: hidden;
    }
    .head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfa;
    }
    .head h2 { margin: 0; font-size: 18px; }
    .note { color: var(--muted); font-size: 13px; }
    .content { padding: 16px; }
    .callout {
      border-left: 4px solid var(--green);
      background: #edf6f1;
      padding: 12px 14px;
      border-radius: 6px;
    }
    a { color: var(--green); }
    @media (max-width: 820px) {
      .app { display: block; }
      aside { position: static; height: auto; }
      .top { display: block; }
      .date-card { text-align: left; margin-top: 12px; }
      main { padding: 16px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <div class="brand">
        <strong>HOZO-AM 早報</strong>
        <span>安全備用頁</span>
      </div>
    </aside>
    <main>
      <div class="top">
        <div>
          <h1>HOZO-AM 任務狀態晨報</h1>
          <div class="subtitle">這是靜態備用頁，不放任何非 HOZO-AM 或舊樣本任務資料。</div>
        </div>
        <div class="date-card">
          <strong>08:30</strong>
          <span>Asia/Taipei</span>
        </div>
      </div>
      <section>
        <div class="head">
          <h2>晨報來源</h2>
          <span class="note">HOZO-AM only</span>
        </div>
        <div class="content">
          <div class="callout">
            正式晨報請使用 <a href="/reports/morning-brief">/reports/morning-brief</a>。
            該頁會即時讀取 HOZO 總控任務庫產生內容；本頁只作為無資料時的安全備用畫面。
          </div>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
