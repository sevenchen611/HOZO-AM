# Postgres 佇列暫不建：Render 每帳戶只允許一顆免費 Postgres，名額已被
# sevenam-queue-db 佔用。HOZO 測試期 webhook 直接寫 Notion（無 DATABASE_URL
# 時自動退回同步模式）。轉正式時把下方註解打開並用付費方案：
# databases:
#   - name: hozoam-queue-db
#     plan: basic-256mb
#     databaseName: hozoam_queue
#     user: hozoam

services:
  - type: web
    name: hozo-am-line-oa-webhook
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: LINE_CHANNEL_ID
        value: "2009385650"
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: NOTION_TOKEN
        sync: false
      - key: HOZO_CONVERSATIONS_DATA_SOURCE_ID
        sync: false
      - key: HOZO_MESSAGES_DATA_SOURCE_ID
        sync: false
      - key: HOZO_ATTACHMENTS_DATA_SOURCE_ID
        sync: false
      - key: HOZO_CODEX_COMMANDS_DATA_SOURCE_ID
        sync: false
      - key: HOZO_DATA_SOURCE_PARENT_BLOCK_ID
        sync: false
      - key: HOZO_ATTACHMENT_CONVERSIONS_DATA_SOURCE_ID
        sync: false
      - key: HOZO_MEETINGS_DATA_SOURCE_ID
        value: fd351c68-6dac-8298-8f0e-87ab1eb6027c
      - key: HOZO_TASKS_DATA_SOURCE_ID
        value: 9c9e34ff-45af-4543-a3ae-11c5cd432b36
      - key: HOZO_PROGRESS_REPORTS_DATA_SOURCE_ID
        value: add70895-645c-4268-9763-3e4bcb2b5b95
      - key: HOZO_DAILY_REPORT_SNAPSHOTS_DATA_SOURCE_ID
        value: 607884fd-afa2-4ddc-8319-70daeb31c549
      - key: HOZO_RESPONSIBILITY_DATA_SOURCE_ID
        value: 5d06662d-47a6-49d2-86dd-f2f59d497077
      - key: HOZO_LINE_GROUP_OPTIONS_DATA_SOURCE_ID
        value: bdab58cf-be1f-4e10-85bd-3ab1b9d5e527
      - key: HOZO_LINE_GROUP_MEMBERS_DATA_SOURCE_ID
        value: 685ddbd8-a7da-42a3-b526-07f335c1bb9e
