services:
  - type: web
    name: hozo-am-line-oa-webhook
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: LINE_CHANNEL_ID
        value: "2009385650"
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: NOTION_TOKEN
        sync: false
      - key: NOTION_VERSION
        value: "2025-09-03"
      - key: HOZO_OUTGOING_ACTOR_NAME
        value: "HOZO Jr."
      - key: HOZO_CODEX_COMMAND_TRIGGERS
        value: "HOZO Junior,HOZ Jr.,HOZO Jr."
      - key: HOZO_DATA_SOURCE_PARENT_BLOCK_ID
        value: 35f51c68-6dac-805f-88b4-e1cf5a86bbc1
      - key: HOZO_CONVERSATIONS_DATA_SOURCE_ID
        value: 37451c68-6dac-8163-b4fa-000b17271536
      - key: HOZO_MESSAGES_DATA_SOURCE_ID
        value: 37451c68-6dac-8187-a6bc-000bbd69c364
      - key: HOZO_ATTACHMENTS_DATA_SOURCE_ID
        value: 37551c68-6dac-81bb-97de-000bebacea77
      - key: HOZO_ATTACHMENT_CONVERSIONS_DATA_SOURCE_ID
        value: 4ce26dc1-0b90-49ad-8e96-73f3a8f23a1f
      - key: HOZO_CODEX_COMMANDS_DATA_SOURCE_ID
        value: 6a500d4c-43ae-4523-bd76-c19a80697bb3
      - key: HOZO_MEETINGS_DATA_SOURCE_ID
        value: fd351c68-6dac-8298-8f0e-87ab1eb6027c
      - key: HOZO_TASKS_DATA_SOURCE_ID
        value: 9c9e34ff-45af-4543-a3ae-11c5cd432b36
      - key: HOZO_PROGRESS_REPORTS_DATA_SOURCE_ID
        value: add70895-645c-4268-9763-3e4bcb2b5b95
      - key: HOZO_RISK_DECISIONS_DATA_SOURCE_ID
        value: 1f6ef6e0-3f5f-49fb-8b80-add787898d7d
      - key: HOZO_AUTOMATION_RUN_LOG_DATA_SOURCE_ID
        value: 5f7a870d-5a34-44a2-b1c8-a17171b6353a
      - key: HOZO_REPORT_TARGET_ID
        sync: false
      - key: HOZO_REPORT_TARGET_TYPE
        value: user
      - key: HOZO_REPORT_TARGET_NAME_KEYWORD
        value: Maggie
      - key: HOZO_REPORT_CC_TARGET_IDS
        value: U77e5ebe92da94e8803e0786d8684f69a
      - key: HOZO_REPORT_CC_TARGET_TYPE
        value: user
      - key: HOZO_REPORT_CC_NAME_KEYWORDS
        value: Seven陳聖文,Seven 陳聖文
      - key: HOZO_CONTROL_API_KEY
        sync: false
      - key: HOZO_REPORT_APPROVAL_KEY
        sync: false
      - key: HOZO_PUBLIC_BASE_URL
        value: https://hozo-am-line-oa-webhook.onrender.com

  - type: cron
    name: hozo-am-meeting-action-sync
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm run meetings:sync -- --limit 50
    schedule: "0 0-14 * * *"
    envVars:
      - key: NOTION_TOKEN
        sync: false
      - key: HOZO_MEETINGS_DATA_SOURCE_ID
        value: fd351c68-6dac-8298-8f0e-87ab1eb6027c
      - key: HOZO_TASKS_DATA_SOURCE_ID
        value: 9c9e34ff-45af-4543-a3ae-11c5cd432b36
      - key: HOZO_PROGRESS_REPORTS_DATA_SOURCE_ID
        value: add70895-645c-4268-9763-3e4bcb2b5b95

  - type: cron
    name: hozo-am-morning-brief
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm run cron:report -- morning
    schedule: "0 0 * * *"
    envVars:
      - key: CRON_JOB_NAME
        value: hozo-am-morning-brief
      - key: CONTROL_API_URL
        value: https://hozo-am-line-oa-webhook.onrender.com/control/reports/send
      - key: CONTROL_LINE_PUSH_URL
        value: https://hozo-am-line-oa-webhook.onrender.com/control/line/push
      - key: HOZO_CRON_ALERTS_ENABLED
        value: "true"
      - key: HOZO_CONTROL_API_KEY
        sync: false

  - type: cron
    name: hozo-am-followup-morning
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm run cron:report -- followup-morning
    schedule: "0 2 * * *"
    envVars:
      - key: CRON_JOB_NAME
        value: hozo-am-followup-morning
      - key: CONTROL_API_URL
        value: https://hozo-am-line-oa-webhook.onrender.com/control/reports/send
      - key: CONTROL_LINE_PUSH_URL
        value: https://hozo-am-line-oa-webhook.onrender.com/control/line/push
      - key: HOZO_CRON_ALERTS_ENABLED
        value: "true"
      - key: HOZO_CONTROL_API_KEY
        sync: false

  - type: cron
    name: hozo-am-followup-midday
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm run cron:report -- followup-midday
    schedule: "0 5 * * *"
    envVars:
      - key: CRON_JOB_NAME
        value: hozo-am-followup-midday
      - key: CONTROL_API_URL
        value: https://hozo-am-line-oa-webhook.onrender.com/control/reports/send
      - key: CONTROL_LINE_PUSH_URL
        value: https://hozo-am-line-oa-webhook.onrender.com/control/line/push
      - key: HOZO_CRON_ALERTS_ENABLED
        value: "true"
      - key: HOZO_CONTROL_API_KEY
        sync: false

  - type: cron
    name: hozo-am-followup-afternoon
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm run cron:report -- followup-afternoon
    schedule: "0 9 * * *"
    envVars:
      - key: CRON_JOB_NAME
        value: hozo-am-followup-afternoon
      - key: CONTROL_API_URL
        value: https://hozo-am-line-oa-webhook.onrender.com/control/reports/send
      - key: CONTROL_LINE_PUSH_URL
        value: https://hozo-am-line-oa-webhook.onrender.com/control/line/push
      - key: HOZO_CRON_ALERTS_ENABLED
        value: "true"
      - key: HOZO_CONTROL_API_KEY
        sync: false

  - type: cron
    name: hozo-am-daily-report
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm run cron:report -- daily
    schedule: "30 12 * * *"
    envVars:
      - key: CRON_JOB_NAME
        value: hozo-am-daily-report
      - key: CONTROL_API_URL
        value: https://hozo-am-line-oa-webhook.onrender.com/control/reports/send
      - key: CONTROL_LINE_PUSH_URL
        value: https://hozo-am-line-oa-webhook.onrender.com/control/line/push
      - key: HOZO_CRON_ALERTS_ENABLED
        value: "true"
      - key: HOZO_CONTROL_API_KEY
        sync: false

